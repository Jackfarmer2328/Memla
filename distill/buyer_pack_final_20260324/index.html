[Dict[str, Any]] = None) -> None:\n        \"\"\"Export a coding trace event\"\"\"\n        event = TraceEvent(\n            timestamp=time.time(),\n            event_type=EventType.CODE_CHANGE,\n            session_id=self.current_session,\n            data={\n                \"file_path\": file_path,\n                \"before_content\": before_content,\n                \"after_content\": after_content,\n                \"change_type\": change_type,\n                \"diff_stats\": self._calculate_diff_stats(before_content, after_content)\n            },\n            metadata=context\n        )\n        self._write_event(event)\n    \n    def export_workflow_event(self,\n                            action: str,\n                            target: str,\n                            result: str,\n                            duration_ms: Optional[int] = None,\n                            context: Optional[Dict[str, Any]] = None) -> None:\n        \"\"\"Export a workflow event\"\"\"\n        event = TraceEvent(\n            timestamp=time.time(),\n            event_type=EventType.WORKFLOW_ACTION,\n            session_id=self.current_session,\n            data={\n                \"action\": action,\n                \"target\": target,\n                \"result\": result,\n                \"duration_ms\": duration_ms\n            },\n            metadata=context\n        )\n        self._write_event(event)\n    \n    def export_test_event(self,\n                         test_command: str,\n                         exit_code: int,\n                         output: str,\n                         duration_ms: int,\n                         files_tested: List[str]) -> None:\n        \"\"\"Export a test execution event\"\"\"\n        event = TraceEvent(\n            timestamp=time.time(),\n            event_type=EventType.TEST_RUN,\n            session_id=self.current_session,\n            data={\n                \"command\": test_command,\n                \"exit_code\": exit_code,\n                \"output\": output,\n                \"duration_ms\": duration_ms,\n                \"files_tested\": files_tested,\n                \"success\": exit_code == 0\n            }\n        )\n        self._write_event(event)\n    \n    def _calculate_diff_stats(self, before: str, after: str) -> Dict[str, int]:\n        \"\"\"Calculate basic diff statistics\"\"\"\n        before_lines = before.splitlines()\n        after_lines = after.splitlines()\n        \n        return {\n            \"lines_added\": len(after_lines) - len(before_lines),\n            \"chars_added\": len(after) - len(before),\n            \"before_line_count\": len(before_lines),\n            \"after_line_count\": len(after_lines)\n        }\n    \n    def _write_event(self, event: TraceEvent) -> None:\n        \"\"\"Write event to JSONL file\"\"\"\n        output_file = self.output_dir / f\"traces_{datetime.now().strftime('%Y%m%d')}.jsonl\"\n        \n        with open(output_file, 'a', encoding='utf-8') as f:\n            json.dump(asdict(event), f, ensure_ascii=False)\n            f.write('\\n')\n```\n\n## Integration Hooks\n\n**`src/export/hooks.py`**\n```python\nimport functools\nimport time\nfrom typing import Callable, Any\nfrom .trace_exporter import TraceExporter\n\n# Global exporter instance\n_exporter = TraceExporter()\n\ndef trace_code_changes(func: Callable) -> Callable:\n    \"\"\"Decorator to automatically trace code changes\"\"\"\n    @functools.wraps(func)\n    def wrapper(*args, **kwargs):\n        start_time = time.time()\n        \n        # Extract file info from common patterns\n        file_path = kwargs.get('file_path') or (args[0] if args else 'unknown')\n        before_content = kwargs.get('before', '')\n        \n        try:\n            result = func(*args, **kwargs)\n            after_content = kwargs.get('after', result if isinstance(result, str) else '')\n            \n            _exporter.export_code_trace(\n                file_path=str(file_path),\n                before_content=before_content,\n                after_content=after_content,\n                change_type=func.__name__,\n                context={\n                    \"function\": func.__name__,\n                    \"duration_ms\": int((time.time() - start_time) * 1000)\n                }\n            )\n            return result\n            \n        except Exception as e:\n            _exporter.export_workflow_event(\n                action=func.__name__,\n                target=str(file_path),\n                result=\"error\",\n                context={\"error\": str(e)}\n            )\n            raise\n    \n    return wrapper\n\ndef trace_workflow(action: str, target: str = \"\"):\n    \"\"\"Decorator to trace workflow actions\"\"\"\n    def decorator(func: Callable) -> Callable:\n        @functools.wraps(func)\n        def wrapper(*args, **kwargs):\n            start_time = time.time()\n            \n            try:\n                result = func(*args, **kwargs)\n                _exporter.export_workflow_event(\n                    action=action,\n                    target=target or str(args[0] if args else \"\"),\n                    result=\"success\",\n                    duration_ms=int((time.time() - start_time) * 1000),\n                    context={\"function\": func.__name__}\n                )\n                return result\n                \n            except Exception as e:\n                _exporter.export_workflow_event(\n                    action=action,\n                    target=target or str(args[0] if args else \"\"),\n                    result=\"error\",\n                    duration_ms=int((time.time() - start_time) * 1000),\n                    context={\"function\": func.__name__, \"error\": str(e)}\n                )\n                raise\n        \n        return wrapper\n    return decorator\n```\n\n## CLI Export Tool\n\n**`scripts/export_traces.py`**\n```python\n#!/usr/bin/env python3\nimport ar te\", help=\"Start date (YYYY-MM-DD)\")\n    parser.add_argument(\"--end-date\", help=\"End date (YYYY-MM-DD)\")\n    parser.add_argument(\"--output\", required=True, help=\"Output JSONL file\")\n    \n    args = parser.parse_args()\n    \n    if args.session:\n        export_session_traces(args.session, Path(args.output))\n    elif args.start_date and args.end_date:\n        export_date_range(args.start_date, args.end_date, Path(args.output))\n    else:\n        print(\"Specify either --session or --start-date/--end-date\")\n```\n\n## Usage Examples\n\n**In your code files:**\n```python\nfrom src.export.hooks import trace_code_changes, trace_workflow\n\n@trace_code_changes\ndef refactor_function(file_path: str, before: str, after: str):\n    # Your refactoring logic\n    return after\n\n@trace_workflow(\"git_commit\", \"repository\")\ndef commit_changes(message: str):\n    # Git commit logic\n    pass\n```\n\n**Manual tracing:**\n```python\nfrom src.export.trace_exporter import TraceExporter\n\nexporter = TraceExporter()\n\n# Trace a code change\nexporter.export_code_trace(\n    file_path=\"src/main.py\",\n    before_content=old_code,\n    after_content=new_code,\n    change_type=\"refactor\",\n    context={\"reason\": \"performance improvement\"}\n)\n\n# Trace a workflow event\nexporter.export_workflow_event(\n    action=\"run_tests\",\n    target=\"test_suite\",\n    result=\"success\",\n    duration_ms=1500\n)\n```\n\n## Configuration\n\n**`config/export_config.yaml`**\n```yaml\nexport:\n  output_dir: \"exports/traces\"\n  max_file_size_mb: 100\n  retention_days: 30\n  \n  # What to capture\n  capture:\n    code_changes: true\n    workflow_events: true\n    test_runs: true\n    build_events: true\n    \n  # Filtering\n  exclude_files:\n    - \"*.log\"\n    - \"node_modules/*\"\n    - \".git/*\"\n    \n  # Privacy\n  sanitize_content: true\n  exclude_secrets: true\n```\n\n## Tests to Run\n\n```bash\n# Test the exporter\npython -m pytest tests/test_trace_exporter. s to JSONL records for training data.\n\n## 1. Create `memory_system/distillation/exporter.py`\n\n```python\nimport json\nimport time\nfrom typing import Dict, List, Iterator, Optional, Any\nfrom dataclasses import dataclass, asdict\nfrom pathlib import Path\nfrom datetime import datetime\n\n@dataclass\nclass CodingTrace:\n    \"\"\"Single coding interaction trace for distillation\"\"\"\n    session_id: str\n    timestamp: float\n    query: str\n    context: Dict\n    workflow_prediction: Optional[Dict]\n    teacher_response: Dict\n    actual_outcome: Dict\n    success_metrics: Dict\n    repo_context: Dict\n\n@dataclass\nclass WorkflowEvent:\n    \"\"\"Workflow event for distillation\"\"\"\n    event_id: str\n    session_id: str\n    timestamp: float\n    event_type: str\n    data: Dict\n    success: bool\n\nclass JSONLExporter:\n    \"\"\"Export coding traces and workflow events to JSONL format\"\"\"\n    \n    def __init__(self, memory_store=None, output_dir: str = \"exports\"):\n        self.memory_store = memory_store\n        self.output_dir = Path(output_dir)\n        self.output_dir.mkdir(exist_ok=True)\n    \n    def export_coding_traces(self, \n                           output_file: str = \"coding_traces.jsonl\",\n                           filter_accepted_only: bool = True,\n                           since_timestamp: Optional[float] = None) -> int:\n        \"\"\"Export coding traces to JSONL format\"\"\"\n        output_path = self.output_dir / output_file\n        \n        traces = self._collect_coding_traces(filter_accepted_only, since_timestamp)\n        count = 0\n        \n        with open(output_path, 'w') as f:\n            for trace in traces:\n                trace_dict = asdict(trace)\n                f.write(json.dumps(trace_dict) + '\\n')\n                count += 1\n        \n        return count\n    \n    def export_workflow_events(self,\n                             output_file: str = \"workflow_events.jsonl\",\n g_speed = statistics.mean(r.speed_improvement for r in self.results)\n        avg_completeness = statistics.mean(r.completeness_score for r in self.results)\n        \n        return ComparisonSummary(\n            total_comparisons=len(self.results),\n            memla_wins=memla_wins,\n            raw_teacher_wins=raw_wins,\n            ties=ties,\n            avg_accuracy_improvement=avg_accuracy,\n            avg_speed_improvement=avg_speed,\n            avg_completeness_improvement=avg_completeness,\n            memla_win_rate=memla_wins / len(self.results),\n            user_satisfaction_score=(memla_wins + ties * 0.5) / len(self.results),\n            generated_at=datetime.now().isoformat()\n        )\n    \n    def _format_comparison_for_buyer(self, result: ComparisonResult) -> Dict:\n        \"\"\"Format a single comparison for buyer presentation\"\"\"\n        return {\n            \"scenario\": result.query,\n            \"raw_teacher\": {\n                \"response_length\": len(result.raw_teacher_response.split()),\n                \"files_mentioned\": len(result.raw_teacher_files),\n                \"commands_provided\": len(result.raw_teacher_commands),\n                \"response_time\": f\"{result.raw_teacher_time:.2f}s\"\n            },\n            \"memla_enhanced\": {\n                \"response_length\": len(result.memla_response.split()),\n                \"files_predicted\": len(result.memla_files),\n                \"commands_predicted\": len(result.memla_commands),\n                \"workflow_confidence\": f\"{result.memla_workflow_plan.get('confidence', 0):.1%}\",\n                \"response_time\": f\"{result.memla_time:.2f}s\"\n            },\n            \"improvements\": {\n                \"accuracy\": f\"+{result.accuracy_improvement:.1%}\",\n                \"speed\": f\"+{result.speed_improvement:.1%}\",\n                \"completeness\": f\"+{result.completeness_score:.1%}\"\n            },\n            \"user_preferred\": result iles\n    metadata: Dict[str, Any]\n    \n    # Analysis data (includes raw suggestions)\n    analysis_data: Dict[str, Any]\n    \n    timestamp: float\n    success: bool\n\nclass FileRanker:\n    \"\"\"Ranks and filters file suggestions for cleaner storage\"\"\"\n    \n    def __init__(self, workspace_path: str):\n        self.workspace_path = Path(workspace_path)\n        self.repo_patterns = self._analyze_repo_patterns()\n    \n    def rank_file_suggestions(self, raw_suggestions: List[str], query: str, \n                            context: Dict) -> Tuple[List[str], Dict[str, float]]:\n        \"\"\"Rank file suggestions and return top candidates with scores\"\"\"\n        \n        # Score each file suggestion\n        scored_files = []\n        for file_path in raw_suggestions:\n            score = self._calculate_file_relevance_score(file_path, query, context)\n            scored_files.append((file_path, score))\n        \n        # Sort by score and filter\n        scored_files.sort(key=lambda x: x[1], reverse=True)\n        \n        # Extract ranked files and scores\n        ranked_files = [file for file, score in scored_files if score > 0.3][:8]  # Top 8\n        file_scores = {file: score for file, score in scored_files}\n        \n        return ranked_files, file_scores\n    \n    def _calculate_file_relevance_score(self, file_path: str, query: str, \n                                      context: Dict) -> float:\n        \"\"\"Calculate relevance score for a file suggestion\"\"\"\n        score = 0.0\n        query_lower = query.lower()\n        file_lower = file_path.lower()\n        \n        # Direct mention in query\n        if any(word in file_lower for word in query_lower.split()):\n            score += 0.4\n        \n        # File type relevance\n        if file_path.endswith('.py') and 'python' in query_lower:\n            score += 0.3\n        elif file_path.endswith('.js') and ('javascript' in query_lower or 'js' in query_lower):\n            score += 0.3\n        elif 'test' in file_lower and 'test' in query_lower:\n            score += 0.4\n        \n        # Repository pattern matching\n        if self._matches_repo_patterns(file_path, query, context):\n            score += 0.2\n        \n        # File existence check\n        if (self.workspace_path / file_path).exists():\n            score += 0.1\n        \n        # Penalize overly generic suggestions\n        generic_patterns = ['main.py', 'utils.py', 'helpers.py', 'common.py']\n        if any(pattern in file_lower for pattern in generic_patterns):\n            score -= 0.1\n        \n        return max(0.0, min(1.0, score))\n    \n    def _matches_repo_patterns(self, file_path: str, query: str, context: Dict) -> bool:\n        \"\"\"Check if file matches repository-specific patterns\"\"\"\n        repo_type = context.get('repo_type', 'unknown')\n        \n        # Web application patterns\n        if repo_type == 'web_app':\n            if 'auth' in query.lower() and 'auth' in file_path.lower():\n                return True\n            if 'api' in query.lower() and ('api' in file_path.lower() or 'views' in file_path.lower()):\n                return True\n        \n        # Data pipeline patterns\n        elif repo_type == 'data_pipeline':\n            if 'process' in query.lower() and 'process' in file_path.lower():\n                return True\n            if 'pipeline' in query.lower() and 'pipeline' in file_path.lower():\n                return True\n        \n        return False\n    \n    def _analyze_repo_patterns(self) -> Dict[str, Any]:\n        \"\"\"Analyze repository patterns for better ranking\"\"\"\n        patterns = {\n            'common_directories': [],\n            'file_extensions': {},\n            'naming_conventions': []\n        }\n        \n        try:\n            # Analyze existing files\n            for file_path in self.workspace_path.rglob('*.py'):\n                if file_path.is_file():\n                    relative_path = file_path.relative_to(self.workspace_path)\n                    \n                    # Track directories\n                    if relative_path.parent != Path('.'):\n                        patterns['common_directories'].append(str(relative_path.parent))\n                    \n                    # Track extensions\n                    ext = file_path.suffix\n                    patterns['file_extensions'][ext] = patterns['file_extensions'].get(ext, 0) + 1\n        \n        except Exception:\n            # Fallback to defaults if analysis fails\n            pass\n        \n        return patterns\n\nclass EnhancedCodingProxy:\n    \"\"\"Enhanced coding proxy with ranked file storage\"\"\"\n    \n    def __init__(self, workspace_path: str, session_id: str = None):\n        self.session_id = session_id or f\"session_{int(time.time())}\"\n        self.workspace_path = workspace_path\n        self.file_ranker = FileRanker(workspace_path)\n        self.traces: List[CodingTrace] = []\n    \n    def create_coding_trace(self, query: str, context: Dict, \n                          raw_file_suggestions: List[str],\n                          workflow_prediction: Dict,\n                          teacher_response: str,\n                          actual_outcome: Dict) -> CodingTrace:\n        \"\"\"Create enhanced coding trace with ranked files\"\"\"\n        \n        # Rank file suggestions\n        ranked_files, file_scores = self.file_ranker.rank_file_suggestions(\n            raw_file_suggestions, query, context\n        )\n        \n        # Create metadata with ranked files\n        metadata = {\n            \"ranked_planned_files\": ranked_files,\n            \"file_relevance_scores\": {f: round(s, 3) for f, s in file_scores.items() if s > 0.3},\n            \"ranking_confidence\": self._calculate_ranking_confidence(file_scores),\n            \"total_suggestions_processed\": len(raw_file_suggestions),\n            \"top_files_count\": len(ranked_files),\n            \"query_complexity\": self._assess_query_complexity(query),\n            \"context_richness\": len(context),\n            \"prediction_quality\": workflow_prediction.get('confidence', 0.0)\n        }\n        \n        # Preserve raw data for analysis\n        analysis_data = {\n            \"raw_file_suggestions\": raw_file_suggestions,\n            \"raw_suggestion_count\": len(raw_file_suggestions),\n            \"ranking_process\": {\n                \"all_scored_files\": {f: round(s, 3) for f, s in file_scores.items()},\n                \"filtering_threshold\": 0.3,\n                \"ranking_algorithm\": \"relevance_score_v1\"\n            },\n            \"workflow_prediction_raw\": workflow_prediction,\n            \"context_analysis\": {\n                \"repo_type\": context.get('repo_type', 'unknown'),\n                \"language\": context.get('language', 'unknown'),\n                \"framework\": context.get('framework', 'unknown')\n            }\n        }\n        \n        # Create trace\n        trace = CodingTrace(\n            session_id=self.session_id,\n            query=query,\n            context=context,\n            workflow_prediction={\n                **workflow_prediction,\n                \"ranked_files\": ranked_files  # Clean ranked files in prediction\n            },\n            teacher_response=teacher_response,\n            teacher_reasoning=self._extract_reasoning(teacher_response),\n            actual_outcome=actual_outcome,\n            metadata=metadata,\n            analysis_data=analysis_data,\n            timestamp=time.time(),\n            success=actual_outcome.get('success', False)\n        )\n        \n        self.traces.append(trace)\n        return trace\n    \n    def get_ranked_files_for_query(self, query: str, context: Dict = None) -> List[str]:\n        \"\"\"Get ranked file suggestions for a query\"\"\"\n        context = context or {}\n        \n        # Generate raw suggestions (this would come from workflow planner)\n        raw_suggestions = self._generate_raw_file_suggestions(query, context)\n        \n        # Rank and return\n        ranked_files, _ = self.file_ranker.rank_file_suggestions(raw_suggestions, query, context)\n        return ranked_files\n    \n    def export_traces_for_training(self, output_path: str) -> str:\n        \"\"\"Export traces with clean ranked files for training\"\"\"\n        output_file = Path(output_path)\n        output_file.parent.mkdir(parents=True, exist_ok=True)\n        \n        training_data = []\n        for trace in self.traces:\n            # Use clean ranked files for training\n            training_example = {\n                \"input\": {\n                    \"query\": trace.query,\n                    \"context\": trace.context\n                },\n                \"target\": {\n                    \"ranked_files\": trace.metadata[\"ranked_planned_files\"],\n                    \"file_scores\": trace.metadata[\"file_relevance_scores\"],\n                    \"workflow_prediction\": trace.workflow_prediction\n                },\n                \"outcome\": {\n                    \"actual_files\": trace.actual_outcome.get('files_modified', []),\n                    \"success\": trace.success\n                },\n                \"metadata\": {\n                    \"session_id\": trace.session_id,\n                    \"timestamp\": trace.timestamp,\n                    \"ranking_confidence\": trace.metadata[\"ranking_confidence\"]\n                }\n            }\n            training_data.append(training_example)\n        \n        with open(output_file, 'w') as f:\n            for example in training_data:\n                f.write(json.dumps(example) + '\\n')\n        \n        return str(output_file)\n    \n    def export_analysis_data(self, output_path: str) -> str:\n        \"\"\"Export full analysis data including raw suggestions\"\"\"\n        output_file = Path(output_path)\n        output_file.parent.mkdir(parents=True, exist_ok=True)\n        \n        analysis_export = []\n        for trace in self.traces:\n            # Include all raw data for analysis\n            analysis_record = {\n                \"session_id\": trace.session_id,\n                \"query\": trace.query,\n                \"context\": trace.context,\n                \"raw_suggestions\": trace.analysis_data[\"raw_file_suggestions\"],\n                \"ranked_files\": trace.metadata[\"ranked_planned_files\"],\n                \"ranking_scores\": trace.analysis_data[\"ranking_process\"][\"all_scored_files\"],\n                \"actual_outcome\": trace.actual_outcome,\n                \"success\": trace.success,\n                \"timestamp\": trace.timestamp\n            }\n            analysis_export.append(analysis_record)\n        \n        with open(output_file, 'w') as f:\n            json.dump(analysis_export, f, indent=2)\n        \n        return str(output_file)\n    \n    def get_ranking_analytics(self) -> Dict[str, Any]:\n        \"\"\"Get analytics on file ranking performance\"\"\"\n        if not self.traces:\n            return {\"error\": \"No traces available\"}\n        \n        total_traces = len(self.traces)\n        successful_traces = [t for t in self.traces if t.success]\n        \n        # Calculate ranking effectiveness\n        ranking_accuracies = []\n        for trace in successful_traces:\n            ranked_files = set(trace.metadata[\"ranked_planned_files\"])\n            actual_files = set(trace.actual_outcome.get('files_modified', []))\n            \n            if ranked_files and actual_files:\n                accuracy = len(ranked_files & actual_files) / len(ranked_files | actual_files)\n                ranking_accuracies.append(accuracy)\n        \n        avg_ranking_accuracy = sum(ranking_accuracies) / len(ranking_accuracies) if ranking_accuracies else 0\n        \n        # Raw vs ranked comparison\n        avg_raw_count = sum(len(t.analysis_data[\"raw_file_suggestions\"]) for t in self.traces) / total_traces\n        avg_ranked_count = sum(len(t.metadata[\"ranked_planned_files\"]) for t in self.traces) / total_traces\n        \n        return {\n            \"total_traces\": total_traces,\n            \"successful_traces\": len(successful_traces),\n            \"success_rate\": len(successful_traces) / total_traces,\n            \"ranking_performance\": {\n                \"average_ranking_accuracy\": round(avg_ranking_accuracy, 3),\n                \"avg_raw_suggestions\": round(avg_raw_count, 1),\n                \"avg_ranked_files\": round(avg_ranked_count, 1),\n                \"noise_reduction\": round((avg_raw_count - avg_ranked_count) / avg_raw_count, 2)\n            },\n            \"confidence_metrics\": {\n                \"avg_ranking_confidence\": round(\n                    sum(t.metadata[\"ranking_confidence\"] for t in self.traces) / total_traces, 3\n                ),\n                \"high_confidence_traces\": len([t for t in self.traces if t.metadata[\"ranking_confidence\"] > 0.7])\n            }\n        }\n    \n    def _calculate_ranking_confidence(self, file_scores: Dict[str, float]) -> float:\n        \"\"\"Calculate confidence in file ranking\"\"\"\n        if not file_scores:\n            return 0.0\n        \n        scores = list(file_scores.values())\n        if len(scores) < 2:\n            return max(scores) if scores else 0.0\n        \n        # Confidence based on score distribution\n        max_score = max(scores)\n        score_variance = sum((s - sum(scores)/len(scores))**2 for s in scores) / len(scores)\n        \n        # Higher confidence when top scores are high and well-separated\n        confidence = min(max_score + (1 - score_variance), 1.0)\n        return round(confidence, 3)\n    \n    def _assess_query_complexity(self, query: str) -> str:\n        \"\"\"Assess query complexity for metadata\"\"\"\n        word_count = len(query.split())\n        \n        if word_count < 5:\n            return \"simple\"\n        elif word_count < 12:\n            return \"moderate\"\n        else:\n            return \"complex\"\n    \n    def _extract_reasoning(self, teacher_response: str) -> str:\n        \"\"\"Extract reasoning from teacher response\"\"\"\n        # Simple extraction - in practice would be more sophisticated\n        lines = teacher_response.split('\\n')\n        reasoning_lines = [line for line in lines if 'because' in line.lower() or 'since' in line.lower()]\n        return ' '.join(reasoning_lines[:2]) if reasoning_lines else \"No explicit reasoning found\"\n    \n    def _generate_raw_file_suggestions(self, query: str, context: Dict) -> List[str]:\n        \"\"\"Generate raw file suggestions (mock implementation)\"\"\"\n        # This would come from the actual workflow planner\n        # Mock implementation for demonstration\n        suggestions = []\n        \n        query_lower = query.lower()\n        \n        # Add common patterns based on query\n        if 'auth' in query_lower:\n            suggestions.extend(['auth.py', 'authentication.py', 'login.py', 'user_", "memla_plan_files": ["memory_system/distillation/coding_proxy.py", "memory_system/distillation/coding_log.py", "tests/test_step6_coding_distillation.py", "memory_system/distillation/__init__.py", "memory_system/distillation/workflow_planner.py", "memory_system/distillation/eval_harness.py"], "memla_plan_commands": ["py -3 -m pytest -q tests/test_step6_coding_distillation.py"], "memla_plan_tests": ["py -3 -m pytest -q tests/test_step6_coding_distillation.py"], "memla_patch_steps": ["I'll extend the workflow planner and coding proxy to build and inject structured workflow plans, then add comprehensive test coverage", "Extend `memory_system/distillation/workflow_planner", "from typing import Dict, List, Optional, Tuple", "from dataclasses import dataclass"], "memla_answer_files": ["memory_system/distillation/coding_proxy.py"], "memla_answer_commands": [], "memla_combined_files": ["memory_system/distillation/coding_proxy.py", "memory_system/distillation/coding_log.py", "tests/test_step6_coding_distillation.py", "memory_system/distillation/__init__.py", "memory_system/distillation/workflow_planner.py", "memory_system/distillation/eval_harness.py"], "memla_combined_commands": ["py -3 -m pytest -q tests/test_step6_coding_distillation.py"], "memla_plan_file_recall": 1.0, "memla_plan_command_recall": 1.0, "memla_combined_file_recall": 1.0, "memla_combined_command_recall": 1.0, "prior_trace_ids": [21, 19, 20, 18]}]}};

    function metricCard(label, value, note) {
      return `<div class="card"><div class="label">${label}</div><div class="metric">${value}</div><div class="sub" style="font-size:14px">${note}</div></div>`;
